aid: apache-tinkerpop
name: Apache TinkerPop
description: >-
  Apache TinkerPop is a graph computing framework for both graph databases (OLTP) and graph
  analytic systems (OLAP). It provides the Gremlin graph traversal language which works with
  any TinkerPop-enabled graph system. TinkerPop abstracts the underlying graph database,
  allowing applications to work with Neo4j, Amazon Neptune, Azure Cosmos DB, JanusGraph,
  Amazon DynamoDB, and other graph databases using a single consistent API. It is maintained
  by the Apache Software Foundation.
type: Index
position: Consumer
access: 3rd-Party
